<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Acesse seu convite ✨</title>

  <!-- Evita indexação -->
  <meta name="robots" content="noindex, nofollow">

  <link rel="stylesheet" href="style.css" />
</head>

<body>

  <main class="container">
    <section class="overlay">

      <h1>Convite especial ✨</h1>

      <p class="subtitle">
        Digite abaixo o código informado no seu convite para acessar
        os detalhes e confirmar presença.
      </p>

      <form class="form-convite">
        <label for="codigo">Código do convite</label>

        <input 
          type="text" 
          id="codigo" 
          name="codigo"
          placeholder="Ex: JU-FAM-001"
          required
        />

        <form class="form-convite" onsubmit"validarCodigo(event)">
        <button type="submit" class="btn-primary">
  Acessar convite
</button>
        <a href="index.html" class="btn-primary">
        Voltar
        </a>
      </form>

      <p class="small-text">
        Caso tenha recebido este convite, mas não possua o código,
        entre em contato com a família da Ju 💫
      </p>

    </section>
  </main>
    <script src="js/dados.js"></script>
    <script src="js/convite.js"></script>
</body>
</html>
